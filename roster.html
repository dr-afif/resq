<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Full Roster</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="top-navigation.css" />
  <link rel="stylesheet" href="roster.css" />
</head>

<body>
  <!-- Desktop Top Navigation Bar -->
  <div id="topnav-container"></div>
  <script src="top-navigation.js"></script>

  <!-- Main Content Layout -->
  <main class="roster-container">
    <div class="roster-header">
      <div class="roster-title-section">
        <h1>Full Roster</h1>
        <p>Displaying the official finalized schedule for <span id="active-month-label" class="month-label-highlight">Loading...</span>.</p>
      </div>
      <div class="month-controls">
        <button id="prev-month-btn" class="control-btn">‹ Prev</button>
        <button id="current-month-btn" class="control-btn">Current Month</button>
        <button id="next-month-btn" class="control-btn">Next ›</button>
      </div>
    </div>

    <!-- Roster Grid Container -->
    <div id="table-container">
      <!-- Roster table will be rendered here dynamically by roster.js -->
    </div>
  </main>

  <!-- Mobile Bottom Tab Navigation -->
  <div id="navbar-container"></div>
  <script>
    fetch('navbar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('navbar-container').innerHTML = html;
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'navbar.css';
        document.head.appendChild(link);
      });
  </script>

  <!-- JavaScript Page Controller -->
  <script src="roster.js"></script>
</body>

</html>
