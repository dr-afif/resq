<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Referral Case Form</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="webform.css?v=sticky-actions-2">
  <link rel="stylesheet" href="top-navigation.css">
  <style>
    /* Multi-step form enhancements */
    .form-steps {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2rem;
      position: relative;
    }
    .form-steps::before {
      content: '';
      position: absolute;
      top: 14px;
      left: 0;
      right: 0;
      height: 2px;
      background: #e2e8f0;
      z-index: 1;
    }
    .step-indicator {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #ffffff;
      border: 2px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: #94a3b8;
      z-index: 2;
      transition: var(--transition-smooth);
    }
    .step-indicator.active {
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
    }
    .step-indicator.completed {
      background: var(--primary);
      border-color: var(--primary);
      color: #ffffff;
    }
    .form-step-content {
      display: none;
    }
    .form-step-content.active {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      animation: fadeIn 0.3s ease-in-out;
    }
    .form-actions {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .btn-step {
      padding: 0.85rem 1.75rem;
      font-weight: 600;
      border-radius: var(--radius-pill);
      border: 1.5px solid #e2e8f0;
      background: #ffffff;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      transition: var(--transition-smooth);
      font-size: 0.95rem;
    }
    .btn-step:hover {
      border-color: #cbd5e1;
      color: var(--text-main);
    }
    .btn-step.btn-next {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }
    .btn-step.btn-next:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }
    .referral-save-status {
      min-height: 1rem;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
    }
    .referral-queue-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .referral-queue-panel .btn-step {
      padding: 0.5rem 0.85rem;
      font-size: 0.8rem;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div id="topnav-container"></div>

  <div class="login-box">
    <h2>Referral Case Form</h2>
    
    <!-- Step Indicators -->
    <div class="form-steps">
      <div class="step-indicator active" id="step-ind-1">1</div>
      <div class="step-indicator" id="step-ind-2">2</div>
      <div class="step-indicator" id="step-ind-3">3</div>
    </div>

    <form id="whatsappForm" novalidate>

      <!-- Step 1: Patient Info -->
      <div class="form-step-content active" id="form-step-1">
        <div class="user-box">
          <label>Patient's Name</label>
          <input type="text" id="name" placeholder="Enter full name" required>
        </div>

        <div class="user-box">
          <label>Patient's MRN / IC</label>
          <input type="text" id="mrn" placeholder="MRN or Identification Card number" required>
        </div>

        <div class="user-box">
          <fieldset class="radio-container-1">
            <legend>From</legend>
            <input type="radio" id="fromFMC" name="from" value="FMC" checked>
            <label for="fromFMC">FMC</label>
            <input type="radio" id="fromPKU" name="from" value="PKU">
            <label for="fromPKU">PKU</label>
            <input type="radio" id="fromOther" name="from" value="Other">
            <label for="fromOther">Others</label>
          </fieldset>
        </div>

        <div class="user-box other-input-container" id="otherInputContainer">
          <label for="otherInput">Specify Source</label>
          <input type="text" id="otherInput" placeholder="Referred from where?">
        </div>
      </div>

      <!-- Step 2: Referral Origin -->
      <div class="form-step-content" id="form-step-2">
        <div class="user-box">
          <label>Working Diagnosis</label>
          <input type="text" id="workingDiagnosis" placeholder="Enter initial working diagnosis" required>
        </div>

        <div class="user-box">
          <label>Referred from (MO / SP name)</label>
          <input type="text" id="referredFrom" placeholder="Doctor referring patient" required>
        </div>

        <div class="user-box">
          <label>Received by (MO RESQ name)</label>
          <input type="text" id="receivedBy" placeholder="RESQ receiving officer" required>
        </div>
      </div>

      <!-- Step 3: Clinical & Action -->
      <div class="form-step-content" id="form-step-3">
        <div class="user-box">
          <label>Primary Team (Department)</label>
          <input type="text" id="primaryDept" placeholder="Department admitting" required>
        </div>

        <div class="user-box">
          <label>Primary Team (MO Name)</label>
          <input type="text" id="primaryMO" placeholder="MO in charge name" required>
        </div>

        <div class="user-box">
          <fieldset class="radio-container-2">
            <legend>Uptriage to</legend>
            <input type="radio" id="YZ" name="uptriage" value="YZ" checked>
            <label for="YZ">Yellow Zone</label>
            <input type="radio" id="RZ" name="uptriage" value="RZ">
            <label for="RZ">Red Zone</label>
            <input type="radio" id="Non" name="uptriage" value="Non">
            <label for="Non">None</label>
          </fieldset>
        </div>

        <div class="user-box">
          <label for="plan">Plan</label>
          <textarea id="plan" placeholder="Outline active clinical plan" required></textarea>
        </div>
      </div>

      <!-- Form Navigation Actions -->
      <div class="form-actions">
        <button type="button" class="btn-step" id="prevBtn" style="visibility: hidden;">Back</button>
        <button type="button" class="btn-step btn-next" id="nextBtn">Next</button>
        <button type="submit" class="btn-step btn-next" id="submitBtn" style="display: none;">Send to RESQ SEU</button>
      </div>
      <div id="referral-save-status" class="referral-save-status" role="status" aria-live="polite"></div>
      <div class="referral-queue-panel">
        <span id="pending-referral-count">Pending saves: 0</span>
        <span id="last-referral-save-status">Last save status: Ready</span>
        <button type="button" class="btn-step" id="retry-referrals-btn">Retry now</button>
        <button type="button" class="btn-step" id="clear-sent-referrals-btn">Clear sent</button>
      </div>

    </form>
  </div>

  <script src="js/config.js"></script>
  <script>
    // Multi-step Navigation Logic
    let currentStep = 1;
    const totalSteps = 3;

    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const submitBtn = document.getElementById('submitBtn');
    const referralSaveStatus = document.getElementById('referral-save-status');
    const pendingReferralCount = document.getElementById('pending-referral-count');
    const lastReferralSaveStatus = document.getElementById('last-referral-save-status');
    const retryReferralsBtn = document.getElementById('retry-referrals-btn');
    const clearSentReferralsBtn = document.getElementById('clear-sent-referrals-btn');
    const REFERRAL_QUEUE_KEY = 'resq_referral_save_queue';
    const REFERRAL_SAVE_TIMEOUT = 30000;
    const referralSaveTimers = {};

    function setReferralStatus(message) {
      if (referralSaveStatus) referralSaveStatus.textContent = message;
      if (lastReferralSaveStatus) lastReferralSaveStatus.textContent = "Last save status: " + message;
    }

    function readReferralQueue() {
      try {
        const savedQueue = localStorage.getItem(REFERRAL_QUEUE_KEY);
        const queue = savedQueue ? JSON.parse(savedQueue) : [];
        return Array.isArray(queue) ? queue : [];
      } catch (error) {
        console.warn("Failed to read referral queue:", error);
        return [];
      }
    }

    function writeReferralQueue(queue) {
      try {
        localStorage.setItem(REFERRAL_QUEUE_KEY, JSON.stringify(queue));
      } catch (error) {
        console.warn("Failed to save referral queue:", error);
      }
      updateReferralQueueUi();
    }

    function updateReferralQueueUi() {
      const queue = readReferralQueue();
      const pendingCount = queue.filter(item => item.status === 'pending' || item.status === 'failed').length;
      if (pendingReferralCount) pendingReferralCount.textContent = `Pending saves: ${pendingCount}`;
    }

    function createReferralQueueItem(payload) {
      const queue = readReferralQueue();
      const item = {
        localId: `ref_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
        createdAt: Date.now(),
        payload,
        status: 'pending',
        retryCount: 0
      };
      queue.push(item);
      writeReferralQueue(queue);
      return item;
    }

    function updateReferralQueueItem(localId, updates) {
      const queue = readReferralQueue();
      const nextQueue = queue.map(item => {
        if (item.localId !== localId) return item;
        return Object.assign({}, item, updates);
      });
      writeReferralQueue(nextQueue);
    }

    function clearSentReferralQueueItems() {
      const queue = readReferralQueue();
      writeReferralQueue(queue.filter(item => item.status !== 'sent'));
      setReferralStatus("Sent referral saves cleared.");
    }

    function sendQueuedReferral(item) {
      if (!item || !item.localId || referralSaveTimers[item.localId]) return;

      const config = window.RESQ_CONFIG || {};
      const referralScriptUrl = config.referralGoogleAppsScriptUrl || "";
      if (!referralScriptUrl) {
        updateReferralQueueItem(item.localId, { status: 'failed' });
        setReferralStatus("Referral queued. Background save not configured.");
        return;
      }

      updateReferralQueueItem(item.localId, {
        status: 'pending',
        retryCount: (item.retryCount || 0) + 1
      });

      const callbackName = `handleReferralQueueResponse_${item.localId}`;
      window[callbackName] = function (data) {
        clearTimeout(referralSaveTimers[item.localId]);
        delete referralSaveTimers[item.localId];
        delete window[callbackName];

        console.log("Google Sheets Response:", data);
        if (data && data.status === "success") {
          updateReferralQueueItem(item.localId, { status: 'sent' });
          setReferralStatus("Referral saved to Google Sheets.");
        } else {
          updateReferralQueueItem(item.localId, { status: 'failed' });
          setReferralStatus("Referral queued. Background save failed: " + ((data && data.message) || "Unable to save"));
        }
      };

      referralSaveTimers[item.localId] = setTimeout(() => {
        delete referralSaveTimers[item.localId];
        delete window[callbackName];
        updateReferralQueueItem(item.localId, { status: 'failed' });
        setReferralStatus("Referral queued. Background save failed.");
      }, REFERRAL_SAVE_TIMEOUT);

      const script = document.createElement("script");
      script.async = true;
      script.onerror = function () {
        clearTimeout(referralSaveTimers[item.localId]);
        delete referralSaveTimers[item.localId];
        delete window[callbackName];
        updateReferralQueueItem(item.localId, { status: 'failed' });
        setReferralStatus("Referral queued. Background save failed.");
      };
      script.src = referralScriptUrl
        + "?callback=" + encodeURIComponent(callbackName)
        + "&data=" + encodeURIComponent(JSON.stringify(item.payload));
      document.body.appendChild(script);
    }

    function retryPendingReferralSaves() {
      readReferralQueue()
        .filter(item => item.status === 'pending' || item.status === 'failed')
        .forEach(sendQueuedReferral);
    }

    function updateFormSteps() {
      // Toggle display of steps content
      for (let i = 1; i <= totalSteps; i++) {
        const stepEl = document.getElementById(`form-step-${i}`);
        const indicator = document.getElementById(`step-ind-${i}`);
        
        if (i === currentStep) {
          stepEl.classList.add('active');
          indicator.className = 'step-indicator active';
        } else {
          stepEl.classList.remove('active');
          if (i < currentStep) {
            indicator.className = 'step-indicator completed';
          } else {
            indicator.className = 'step-indicator';
          }
        }
      }

      // Action buttons visibility
      if (currentStep === 1) {
        prevBtn.style.visibility = 'hidden';
        nextBtn.style.display = 'block';
        submitBtn.style.display = 'none';
      } else if (currentStep === totalSteps) {
        prevBtn.style.visibility = 'visible';
        nextBtn.style.display = 'none';
        submitBtn.style.display = 'block';
      } else {
        prevBtn.style.visibility = 'visible';
        nextBtn.style.display = 'block';
        submitBtn.style.display = 'none';
      }
    }

    function validateStep(step) {
      const stepContainer = document.getElementById(`form-step-${step}`);
      const inputs = stepContainer.querySelectorAll('input[required], textarea[required]');
      let valid = true;

      inputs.forEach(input => {
        if (!input.value.trim()) {
          input.focus();
          valid = false;
          input.style.borderColor = 'var(--color-red)';
          setTimeout(() => { input.style.borderColor = ''; }, 3000);
        }
      });
      return valid;
    }

    nextBtn.addEventListener('click', () => {
      if (validateStep(currentStep)) {
        if (currentStep < totalSteps) {
          currentStep++;
          updateFormSteps();
        }
      }
    });

    prevBtn.addEventListener('click', () => {
      if (currentStep > 1) {
        currentStep--;
        updateFormSteps();
      }
    });

    // Function to show/hide other input field
    function toggleOtherInput() {
      const otherRadio = document.getElementById('fromOther');
      const otherInputContainer = document.getElementById('otherInputContainer');
      const otherInput = document.getElementById('otherInput');

      if (otherRadio.checked) {
        otherInputContainer.classList.add('show');
        otherInput.setAttribute('required', 'true');
      } else {
        otherInputContainer.classList.remove('show');
        otherInput.removeAttribute('required');
        otherInput.value = '';
      }
    }

    // Add event listeners to all from radio buttons
    document.querySelectorAll('input[name="from"]').forEach(radio => {
      radio.addEventListener('change', toggleOtherInput);
    });

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      toggleOtherInput();
      updateReferralQueueUi();
      retryPendingReferralSaves();
    });
    if (retryReferralsBtn) retryReferralsBtn.addEventListener('click', retryPendingReferralSaves);
    if (clearSentReferralsBtn) clearSentReferralsBtn.addEventListener('click', clearSentReferralQueueItems);
    window.addEventListener('online', retryPendingReferralSaves);

    // Form Submission Action
    document.getElementById("whatsappForm").addEventListener("submit", function (e) {
      e.preventDefault();

      if (!validateStep(currentStep)) return;

      let name = document.getElementById("name").value;
      let mrn = document.getElementById("mrn").value;
      let from = document.querySelector("input[name='from']:checked").value;

      if (from === "Other") {
        from = document.getElementById("otherInput").value || "Other";
      }

      let diagnosis = document.getElementById("workingDiagnosis").value;
      let referred = document.getElementById("referredFrom").value;
      let received = document.getElementById("receivedBy").value;
      let dept = document.getElementById("primaryDept").value;
      let mo = document.getElementById("primaryMO").value;
      let uptriage = document.querySelector("input[name='uptriage']:checked").value;
      let plan = document.getElementById("plan").value;

      let message = `*REFERRAL CASE*\n\n*Name*: ${name}\n*Mrn/ic*: ${mrn}\n\n*From*: ${from}\n*Working Diagnosis*: ${diagnosis}\n*Referred from*: ${referred}\n*Received by*: ${received}\n*Primary team*: ${dept} - ${mo}\n*Uptriage to*: ${uptriage}\n\n*Plan*: ${plan}`;

      // Build payload
      const payload = {
        name, mrn, from, diagnosis, referred, received, dept, mo, uptriage, plan
      };

      const config = window.RESQ_CONFIG || {};

      // WhatsApp - Copy message and open group
      try {
        const groupID = config.whatsappGroupId || "";
        if (!groupID) throw new Error("WhatsApp group ID is not configured");
        const whatsappUrl = `https://chat.whatsapp.com/${groupID}`;

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(message).catch(err => {
            console.warn("Clipboard not available:", err);
            prompt("Copy this message and paste it in WhatsApp:", message);
          });
          window.open(whatsappUrl, "_blank");
        } else {
          window.open(whatsappUrl, "_blank");
          prompt("Copy this message and paste it in WhatsApp:", message);
        }

        setReferralStatus("Referral prepared. Saving in background…");

      } catch (error) {
        console.error("Error opening WhatsApp:", error);
        alert("⚠️ Error opening WhatsApp. Please try again.");
      }

      const queuedReferral = createReferralQueueItem(payload);
      sendQueuedReferral(queuedReferral);
    });

    // Callback for JSONP
    window.handleResponse = function (data) {
      console.log("Google Sheets Response:", data);
      if (data && data.status === "success") {
        setReferralStatus("Referral saved to Google Sheets.");
      } else {
        setReferralStatus("Referral prepared. Background save failed: " + ((data && data.message) || "Unable to save"));
      }
    }
  </script>

  <div id="navbar-container"></div>
  <script>
    fetch('navbar.html')
      .then(res => {
        if (!res.ok) throw new Error('Navbar fetch failed');
        return res.text();
      })
      .then(html => {
        const container = document.getElementById('navbar-container');
        if (!container) return;
        container.innerHTML = html;
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'navbar.css';
        document.head.appendChild(link);
      })
      .catch(() => {});
  </script>

  <script src="top-navigation.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }
  </script>
  <script src="js/pwa-status.js"></script>
</body>

</html>
